<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tool - Karel Code Generator</title>
        <link rel="icon" src="images/favicon.png">
        <style>
            @import "https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap";
            html, body {
                height: 100%;
                margin: 0;
                font-family: "inter";
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                display: flex;
                min-height: 100vh;
                width: 100%;
                align-items: center;
                justify-content: center;
                /*background-image: linear-gradient(to bottom right, rgba(0, 0, 0, 0.569) 0%, white 60%);*/
            }
            #alignment {
                aspect-ratio: 3 / 2;
                width: 100vw;
                max-height: 100vh;
                height: auto;
                background-color: aquamarine;
                container-type: size;
            }
            @media (orientation: portrait) {
                #alignment {
                    aspect-ratio: 4 / 5;
                    height: 100vh;
                    max-width: 100vw;
                    width: auto;
                }
            }
            #canvas-container {
                background-color: rgb(181, 30, 30);
                width: min(100cqh, 100cqw);
                aspect-ratio: 1 / 1;
                height: auto;
                container-type: size;
                display: flex;
                align-items: center;
            }
            canvas {
                background-color: rgb(177, 177, 177);
                border: none;
                width: 100cqw;
                height: 100cqh;
            }
        /* @media(width > height) {
            /* canvas {
                width: 100vh;
                aspect-ratio: 1 / 1;
            }
        } */
        
        /* @media (max-width: 600px) {

        </style>
    </head>
    <body>
        <div id = "alignment">
            <div id="canvas-container">
                <canvas id="grid" width="1000" height="1000">
                    Your browser does not support the HTML canvas tag.
                </canvas>
            </div>
            <div id="settings">

            </div>
        </div>

        <script>
            let dimensionBasis = 1000;
            let c = document.getElementById("grid");
            c.width = dimensionBasis;
            c.height = dimensionBasis;
            c.style.width = "100cqw";
            c.style.height = "100cqh";
            let ctx = c.getContext('2d');

            class Intersection {
                static avenues = 10; //{--avenues--};
                static streets = 10; //{--streets--};
                static city = [
                    [new Intersection(0, 0, "0"), new Intersection(1, 0, "0"), new Intersection(2, 0, "0"), new Intersection(3, 0, "0"), new Intersection(4, 0, "0"), new Intersection(5, 0, "0"), new Intersection(6, 0, "0"), new Intersection(7, 0, "0"), new Intersection(8, 0, "0"), new Intersection(9, 0, "0")],
                    [new Intersection(0, 1, "0"), new Intersection(1, 1, "0"), new Intersection(2, 1, "0"), new Intersection(3, 1, "0"), new Intersection(4, 1, "0"), new Intersection(5, 1, "0"), new Intersection(6, 1, "0"), new Intersection(7, 1, "0"), new Intersection(8, 1, "0"), new Intersection(9, 1, "0")],
                    [new Intersection(0, 2, "0"), new Intersection(1, 2, "0"), new Intersection(2, 2, "0"), new Intersection(3, 2, "0"), new Intersection(4, 2, "0"), new Intersection(5, 2, "0"), new Intersection(6, 2, "0"), new Intersection(7, 2, "0"), new Intersection(8, 2, "0"), new Intersection(9, 2, "0")],
                    [new Intersection(0, 3, "0"), new Intersection(1, 3, "0"), new Intersection(2, 3, "0"), new Intersection(3, 3, "0"), new Intersection(4, 3, "0"), new Intersection(5, 3, "0"), new Intersection(6, 3, "0"), new Intersection(7, 3, "0"), new Intersection(8, 3, "0"), new Intersection(9, 3, "0")],
                    [new Intersection(0, 4, "0"), new Intersection(1, 4, "0"), new Intersection(2, 4, "0"), new Intersection(3, 4, "0"), new Intersection(4, 4, "0"), new Intersection(5, 4, "0"), new Intersection(6, 4, "0"), new Intersection(7, 4, "0"), new Intersection(8, 4, "0"), new Intersection(9, 4, "0")],
                    [new Intersection(0, 5, "0"), new Intersection(1, 5, "0"), new Intersection(2, 5, "0"), new Intersection(3, 5, "0"), new Intersection(4, 5, "0"), new Intersection(5, 5, "0"), new Intersection(6, 5, "0"), new Intersection(7, 5, "0"), new Intersection(8, 5, "0"), new Intersection(9, 5, "0")],
                    [new Intersection(0, 6, "0"), new Intersection(1, 6, "0"), new Intersection(2, 6, "0"), new Intersection(3, 6, "0"), new Intersection(4, 6, "0"), new Intersection(5, 6, "0"), new Intersection(6, 6, "0"), new Intersection(7, 6, "0"), new Intersection(8, 6, "0"), new Intersection(9, 6, "0")],
                    [new Intersection(0, 7, "0"), new Intersection(1, 7, "0"), new Intersection(2, 7, "0"), new Intersection(3, 7, "0"), new Intersection(4, 7, "0"), new Intersection(5, 7, "0"), new Intersection(6, 7, "0"), new Intersection(7, 7, "0"), new Intersection(8, 7, "0"), new Intersection(9, 7, "0")],
                    [new Intersection(0, 8, "0"), new Intersection(1, 8, "0"), new Intersection(2, 8, "0"), new Intersection(3, 8, "0"), new Intersection(4, 8, "0"), new Intersection(5, 8, "0"), new Intersection(6, 8, "0"), new Intersection(7, 8, "0"), new Intersection(8, 8, "0"), new Intersection(9, 8, "0")],
                    [new Intersection(0, 9, "0"), new Intersection(1, 9, "0"), new Intersection(2, 9, "0"), new Intersection(3, 9, "0"), new Intersection(4, 9, "0"), new Intersection(5, 9, "0"), new Intersection(6, 9, "0"), new Intersection(7, 9, "0"), new Intersection(8, 9, "0"), new Intersection(9, 9, "0")]
                ];
                // "0" is an empty intersection
                // "#" indicates beeper(s) in that intersesction (number)
                // "r" indicates a robot in that intersection
                // "h" indicates a horizontal wall
                // "v" indicates a vertical wall
                static blockWidth = dimensionBasis/Math.max(Intersection.avenues, Intersection.streets);
                static refreshCity(newStreets, newAvenues) { 
                    if (Intersection.streets > Intersection.avenues) {
                        c.width = dimensionBasis / Intersection.streets * Intersection.avenues;
                        c.height = dimensionBasis;
                    } else {
                        c.height = dimensionBasis / Intersection.avenues * Intersection.streets;
                        c.width = dimensionBasis;
                    }
                    Intersection.blockWidth = 1000/Math.max(Intersection.avenues, Intersection.streets);
                    Intersection.city = []
                    for (let i = 0; i < Intersection.streets; i++) {
                        let street = [];
                        for (let k = 0; k < Intersection.avenues; k++) {
                            street.push(new Intersection(k, i, "0"));
                        }
                        Intersection.city.push(street);
                    }
                }
                constructor(avenue, street, content) { 
                    this.avenue = avenue;
                    this.street = street;
                    this.content = content;
                    this.coords = [avenue*Intersection.blockWidth, street*Intersection.blockWidth];
                }
                getCenter() {
                    return [this.coords[0]+Intersection.blockWidth/2, this.coords[1]+Intersection.blockWidth/2]
                }
                minX() {
                    return this.coords[0];
                }
                maxX() {
                    return this.coords[0]+Intersection.blockWidth;
                }
                minY() {
                    return this.coords[1];
                }
                maxY() {
                    return this.coords[1]+Intersection.blockWidth;
                }
                draw() {
                    ctx.beginPath();
                    ctx.strokeStyle = "black";
                    ctx.lineWidth = 2;
                    //ctx.fillStyle = "white";
                    let center = this.getCenter();
                    if (this.content == "0") {
                        ctx.moveTo(center[0], this.minY());
                        ctx.lineTo(center[0], this.maxY());
                        ctx.moveTo(this.minX(), center[1]);
                        ctx.lineTo(this.maxX(), center[1]);
                    } else if (this.content == "r") {
                        
                    }
                    ctx.stroke();
                    //ctx.fill();
                }
            }
            Intersection.city = [
                    [new Intersection(0, 0, "0"), new Intersection(1, 0, "0"), new Intersection(2, 0, "0"), new Intersection(3, 0, "0"), new Intersection(4, 0, "0"), new Intersection(5, 0, "0"), new Intersection(6, 0, "0"), new Intersection(7, 0, "0"), new Intersection(8, 0, "0"), new Intersection(9, 0, "0")],
                    [new Intersection(0, 1, "0"), new Intersection(1, 1, "0"), new Intersection(2, 1, "0"), new Intersection(3, 1, "0"), new Intersection(4, 1, "0"), new Intersection(5, 1, "0"), new Intersection(6, 1, "0"), new Intersection(7, 1, "0"), new Intersection(8, 1, "0"), new Intersection(9, 1, "0")],
                    [new Intersection(0, 2, "0"), new Intersection(1, 2, "0"), new Intersection(2, 2, "0"), new Intersection(3, 2, "0"), new Intersection(4, 2, "0"), new Intersection(5, 2, "0"), new Intersection(6, 2, "0"), new Intersection(7, 2, "0"), new Intersection(8, 2, "0"), new Intersection(9, 2, "0")],
                    [new Intersection(0, 3, "0"), new Intersection(1, 3, "0"), new Intersection(2, 3, "0"), new Intersection(3, 3, "0"), new Intersection(4, 3, "0"), new Intersection(5, 3, "0"), new Intersection(6, 3, "0"), new Intersection(7, 3, "0"), new Intersection(8, 3, "0"), new Intersection(9, 3, "0")],
                    [new Intersection(0, 4, "0"), new Intersection(1, 4, "0"), new Intersection(2, 4, "0"), new Intersection(3, 4, "0"), new Intersection(4, 4, "0"), new Intersection(5, 4, "0"), new Intersection(6, 4, "0"), new Intersection(7, 4, "0"), new Intersection(8, 4, "0"), new Intersection(9, 4, "0")],
                    [new Intersection(0, 5, "0"), new Intersection(1, 5, "0"), new Intersection(2, 5, "0"), new Intersection(3, 5, "0"), new Intersection(4, 5, "0"), new Intersection(5, 5, "0"), new Intersection(6, 5, "0"), new Intersection(7, 5, "0"), new Intersection(8, 5, "0"), new Intersection(9, 5, "0")],
                    [new Intersection(0, 6, "0"), new Intersection(1, 6, "0"), new Intersection(2, 6, "0"), new Intersection(3, 6, "0"), new Intersection(4, 6, "0"), new Intersection(5, 6, "0"), new Intersection(6, 6, "0"), new Intersection(7, 6, "0"), new Intersection(8, 6, "0"), new Intersection(9, 6, "0")],
                    [new Intersection(0, 7, "0"), new Intersection(1, 7, "0"), new Intersection(2, 7, "0"), new Intersection(3, 7, "0"), new Intersection(4, 7, "0"), new Intersection(5, 7, "0"), new Intersection(6, 7, "0"), new Intersection(7, 7, "0"), new Intersection(8, 7, "0"), new Intersection(9, 7, "0")],
                    [new Intersection(0, 8, "0"), new Intersection(1, 8, "0"), new Intersection(2, 8, "0"), new Intersection(3, 8, "0"), new Intersection(4, 8, "0"), new Intersection(5, 8, "0"), new Intersection(6, 8, "0"), new Intersection(7, 8, "0"), new Intersection(8, 8, "0"), new Intersection(9, 8, "0")],
                    [new Intersection(0, 9, "0"), new Intersection(1, 9, "0"), new Intersection(2, 9, "0"), new Intersection(3, 9, "0"), new Intersection(4, 9, "0"), new Intersection(5, 9, "0"), new Intersection(6, 9, "0"), new Intersection(7, 9, "0"), new Intersection(8, 9, "0"), new Intersection(9, 9, "0")]
                ];
            for (let i of Intersection.city) {
                for (let k of i) {
                    k.draw();
                }
            }
        </script>
    </body>
</html>
