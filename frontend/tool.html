<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tool - Karel Code Generator</title>
        <link rel="icon" href="/frontend/images/logos_banners/karelography_logo.svg">
        <style>
            @import "https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap";
            html, body {
                height: 100%;
                margin: 0;
                font-family: "inter";
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                display: flex;
                min-height: 100vh;
                width: 100%;
                align-items: center;
                justify-content: center;
                /*background-image: linear-gradient(to bottom right, rgba(0, 0, 0, 0.569) 0%, white 60%);*/
            }
            #alignment {
                aspect-ratio: 3 / 2;
                width: 100vw;
                max-height: 100vh;
                height: auto;
                background-color: aquamarine;
                container-type: size;
            }
            @media (orientation: portrait) {
                #alignment {
                    aspect-ratio: 4 / 5;
                    height: 100vh;
                    max-width: 100vw;
                    width: auto;
                }
            }
            #canvas-container {
                background-color: rgb(255, 255, 255);
                width: min(100cqh, 100cqw);
                aspect-ratio: 1 / 1;
                height: auto;
                container-type: size;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            canvas {
                background-color: #ffffff;
                border: 2px solid black;
                width: 100cqw;
                height: 100cqh;
            }
        /* @media(width > height) {
            /* canvas {
                width: 100vh;
                aspect-ratio: 1 / 1;
            }
        } */
        
        /* @media (max-width: 600px) {
            
        } */
        </style>
    </head>
    <body>
        <div id = "alignment">
            <div id="canvas-container">
                <canvas id="grid" width="1000" height="1000">
                    Your browser does not support the HTML canvas tag.
                </canvas>
            </div>
            <div id="settings">
                <label for="color-selector">Select Robot Color</label>
                <input type="color" id="color-selector">
            </div>
        </div>

        <script>
            let dimensionBasis = 1000;
            let c = document.getElementById("grid");
            c.width = dimensionBasis;
            c.height = dimensionBasis;
            c.style.width = "100cqw";
            c.style.height = "100cqh";
            let ctx = c.getContext('2d');
            let imgRoot = "/frontend/images/"
            let source = [
                "robot_north",
                "robot_south",
                "robot_east",
                "robot_west",
                "beeper",
                "horizontal_wall",
                "vertical_wall"
            ];
            
            class Robot {
                constructor(x, y, direction, numBeepers, color) {
                    this.x = x;
                    this.y = y;
                    this.direction = direction; 
                    this.numBeepers = numBeepers; // can be Inifnity
                    this.color = [255, 255, 255];
                    document.getElementById("color-selector").addEventListener("change", (val) => {
                        let myColor = val.target.value;
                        myColor = myColor.replace("#", "");
                        console.log(myColor);
                        for (let i = 0; i < 3; i++) {
                            let hex = myColor.substring(i*2, i*2+2);
                            let intOne = parseInt(hex[0], 16);
                            let intTwo = parseInt(hex[1], 16);
                            this.color[i] = intOne*16 + intTwo;
                        }
                        Intersection.city[this.y][this.x].reset();
                    });
                    this.history = []
                    this.isSprinting = false;
                }
                getPose() {
                    return [this.x, this.y];
                }
                resetIntersection(grid, xOffset, yOffset) {
                    try {
                        grid[this.y+yOffset][this.x+xOffset].reset();
                    } catch {
                        //nothing
                    }
                }
                setDirection(direction) {
                    let mapping = direction === "n" ? 0 : direction === "e" ? 1 : direction === "s" ? 2 : 3;
                    let current = this.direction === "n" ? 0 : this.direction === "e" ? 1 : this.direction === "s" ? 2 : 3;
                    for (let i = 0; i < (current-mapping+4)%4; i++) {
                        this.history.push("t");
                    }
                    this.direction = direction;
                }
                // north to south 0 -> 2 north to west 0 -> 3
                move() {
                    if (this.direction === "s") {
                         
                    }
                    if (this.isSprinting) {
                        this.isSprinting = false;
                        this.move();
                    }
                    if (this.direction === "n") {
                        this.y += 1;
                        this.resetIntersection(Intersection.city, 0, -1);

                    } else if (this.direction === "s") {
                        this.y -= 1;
                        this.resetIntersection(Intersection.city, 0, 1);
                    } else if (this.direction === "e") {
                        this.x += 1;
                        this.resetIntersection(Intersection.city, -1, 0);
                    } else {
                        this.x -= 1;
                        this.resetIntersection(Intersection.city, 1, 0);
                    }
                    if (this.x >= 0 && this.x <= Intersection.avenues && this.y >= 0 && this.y <= Intersection.streets) {
                        this.history.push("m");
                    } else {
                        this.x = Math.max(0, Math.min(Intersection.avenues, this.x));
                        this.y = Math.max(0, Math.min(Intersection.streets, this.y));
                    }
                    this.resetIntersection(Intersection.city, 0, 0);
                    console.log(`Direction = ${this.direction}, Coords = ${this.x}, ${this.y}`);
                }

                moveAbsolute(direction) {
                    this.setDirection(direction);
                    this.move();
                }

                uTurn() {
                    if (this.direction === "n") {
                        this.direction = "s";
                    } else if (this.direction === "s") {
                        this.direction = "n";
                    } else if (this.direction === "e") {
                        this.direction = "w";
                    } else {
                        this.direction = "e";
                    }
                    this.history.push("t");
                    this.history.push("t");
                    this.resetIntersection(Intersection.city, 0, 0);
                }
                turnRight() {
                    if (this.isSprinting) {
                        this.isSprinting = false;
                        this.uTurn();
                        return;
                    }
                    if (this.direction === "n") {
                        this.direction = "e";
                    } else if (this.direction === "s") {
                        this.direction = "w";
                    } else if (this.direction === "e") {
                        this.direction = "s";
                    } else {
                        this.direction = "n";
                    }
                    this.history.push("t");
                    this.history.push("t");
                    this.history.push("t");
                    this.resetIntersection(Intersection.city, 0, 0);
                }
                turnLeft() {
                    if (this.isSprinting) {
                        this.isSprinting = false;
                        this.uTurn();
                        return;
                    }
                    if (this.direction === "n") {
                        this.direction = "w";
                    } else if (this.direction === "s") {
                        this.direction = "e";
                    } else if (this.direction === "e") {
                        this.direction = "n";
                    } else {
                        this.direction = "s";
                    }
                    this.history.push("t");
                    this.resetIntersection(Intersection.city, 0, 0);
                }
                putBeeper() {
                    if (Intersection.city[robot.y][robot.x].buffer) return;
                    if (robot.numBeepers <= 0) return;
                    robot.numBeepers -= 1;
                    Intersection.city[this.y][this.x].increaseBeeper(1);
                    this.history.push("o");
                    this.resetIntersection(Intersection.city, 0, 0);
                }
                pickBeeper() {
                    if (this.isSprinting) {
                        this.isSprinting = false;
                        this.pickBeeper();
                    }
                    
                    let success = Intersection.city[this.y][this.x].decreaseBeeper(1);
                    if (success) {
                        this.numBeepers += 1;
                        this.history.push("i");
                    }
                    this.resetIntersection(Intersection.city, 0, 0);
                }
                draw(center, blockWidth) {
                    if (this.direction === "n") {
                        var img = images["robot_north"]
                    } else if (this.direction == "s") {
                        var img = images["robot_south"]
                    } else if (this.direction == "e") {
                        var img = images["robot_east"]
                    } else {
                        var img = images["robot_west"]
                    }

                    let botWidth = 0.6;
                    let area = blockWidth * botWidth;
                    let top_corner = [center[0]-0.5*area, center[1]-0.5*area];

                    // ctx.save();

                    ctx.drawImage(img, top_corner[0], top_corner[1], area, area);

                    // // ctx.globalCompositeOperation = "source-atop";
                    // // ctx.fillStyle = `rgb(${this.color[0]}, ${this.color[1]}, ${this.color[2]})`;
                    // // ctx.fillRect(top_corner[0], top_corner[1], area, area);
                    // // ctx.restore();

                    // let imgData = ctx.getImageData(top_corner[0], top_corner[1], area, area);
                    // for (let i = 0; i < imgData.data.length; i+=4) {
                    //     imgData[i] = this.color[0];
                    //     imgData[i+1] = this.color[1];
                    //     imgData[i+2] = this.color[2];
                    // }

                    // ctx.putImageData(imgData, top_corner[0], top_corner[1]);

                    ctx.drawImage(img, top_corner[0], top_corner[1], area, area);

                    ctx.globalCompositeOperation = "multiply";
                    ctx.fillStyle = `rgb(${this.color[0]}, ${this.color[1]}, ${this.color[2]})`;
                    ctx.fillRect(top_corner[0], top_corner[1], area, area);

                    ctx.globalCompositeOperation = "destination-atop";
                    ctx.drawImage(img, top_corner[0], top_corner[1], area, area);

                    ctx.globalCompositeOperation = "source-over";
                }
            }

            robot = new Robot(0, 0, "e", 4, "red");
            function loadImages(sources) {
                let images = {};
                let loaded = 0;
                let total = Object.keys(sources).length;
                return new Promise(resole => {
                    for (let key of sources) {
                        let img = new Image();
                        img.crossOrigin = "anonymous";
                        img.src = imgRoot+key+".png";

                        img.onload = () => {
                            loaded++;
                            if (loaded === total) {
                                resole(images);
                            }
                        };

                        images[key] = img;
                    }
                });
            }

            class Intersection {
                static avenues = 10;
                static streets = 10;
                static city = [];
                static cityBufferless = [];
                
                static blockWidth = dimensionBasis/Math.max(Intersection.avenues+1, Intersection.streets+1);

                static resetAll() {
                    ctx.clearRect(0, 0, c.width, c.height);
                    for (let i of Intersection.city) {
                        for (let k of i) {
                            k.resetNoClear();
                        }
                    }
                }
                static resizeCity(newStreets, newAvenues) { 
                    let oldStreets = Intersection.streets;
                    let oldAvenues = Intersection.avenues;
                    let oldCity = Intersection.cityBufferless;

                    if (newStreets <= 0) newStreets = 1;
                    if (newAvenues <= 0) newAvenues = 1;

                    Intersection.streets = newStreets;
                    Intersection.avenues = newAvenues;
                    Intersection.blockWidth = dimensionBasis/Math.max(Intersection.avenues+1, Intersection.streets+1);

                    c.width = Intersection.blockWidth*(newAvenues+1);
                    c.height = Intersection.blockWidth*(newStreets+1);
                    c.style.width = `${100*(newAvenues+1)/Math.max((newAvenues+1), (newStreets+1))}cqw`;
                    c.style.height = `${100*(newStreets+1)/Math.max((newAvenues+1), (newStreets+1))}cqh`;

                    let newCity = [];
                    let bufferRow = [];
                    for (let i = 0; i < newStreets; i++) {
                        let street = [];
                        for (let k = 0; k < newAvenues; k++) {
                            if (i === newStreets-1) {
                                bufferRow.push(new Intersection(k, newStreets, true));
                            }
                            street.push(new Intersection(k, i, false));
                        }
                        newCity.push(street);
                    }
                    bufferRow.push(new Intersection(bufferRow.length, newStreets, true))

                    let rowsToCheck = Math.min(newCity.length, oldCity.length);
                    let colsToCheck = Math.min(newCity[0].length, oldCity[0].length);

                    for (let i = 0; i < rowsToCheck; i++) {
                        for (let k = 0; k < colsToCheck; k++) {
                            newCity[i][k].horizontalWall = oldCity[i][k].horizontalWall;
                            newCity[i][k].verticalWall = oldCity[i][k].verticalWall;
                            newCity[i][k].numBeepers = oldCity[i][k].numBeepers;
                        }
                    }

                    Intersection.cityBufferless = newCity;

                    for (let i of newCity) {
                        i.push(new Intersection(i.length, i[0].street, true))
                    }
                    newCity.push(bufferRow);
                    Intersection.city = newCity;
                    Intersection.resetAll();

                    console.log(Intersection.city);
                }
                // problem: canvas origin not in same place as karel's - FIXED
                static initializeCity() {
                    Intersection.city = [];
                    Intersection.cityBufferless = []

                    for (let i = 0; i < Intersection.streets+1; i++) {
                        let street = [];
                        let bufferLess = [];

                        for (let k = 0; k < Intersection.avenues+1; k++) {
                            if (k === Intersection.avenues) {
                                street.push(new Intersection(k, i, true));
                            } else {
                                street.push(new Intersection(k, i, i === Intersection.streets ? true : false));
                            }
                            if (k < Intersection.avenues) {
                                bufferLess.push(new Intersection(k, i, false));
                            }
                        }

                        Intersection.city.push(street);

                        if (i < Intersection.streets) {
                            Intersection.cityBufferless.push(bufferLess);
                        }
                    }
                }
                constructor(avenue, street, buffer) { 
                    this.avenue = avenue;
                    this.street = street;
                    this.buffer = buffer;
                    this.width = Intersection.blockWidth;
                    this.numBeepers = 0;
                    this.horizontalWall = false;
                    this.verticalWall = false;
                    this.coords = [avenue*Intersection.blockWidth, ((Intersection.streets)-street)*Intersection.blockWidth];
                    this.hasRobot = robot.getPose()[0] === this.avenue && robot.getPose()[1] === this.street;
                }
                // clear the intersection before drawing instead of overlapping
                reset() {
                    ctx.clearRect(this.minX(), this.minY(), this.width, this.width);

                    this.coords = [this.avenue*Intersection.blockWidth, ((Intersection.streets)-this.street)*Intersection.blockWidth];
                    this.width = Intersection.blockWidth;
                    this.hasRobot = robot.getPose()[0] === this.avenue && robot.getPose()[1] === this.street;

                    this.draw();
                }
                resetNoClear() {
                    this.coords = [this.avenue*Intersection.blockWidth, ((Intersection.streets)-this.street)*Intersection.blockWidth];
                    this.width = Intersection.blockWidth;
                    this.hasRobot = robot.getPose()[0] === this.avenue && robot.getPose()[1] === this.street;

                    this.draw();
                }
                setContent(content) {
                    this.numBeepers = parseInt(content[0]);
                    this.horizontalWall = content[1] === "1";
                    this.verticalWall = content[2] === "1";
                    this.reset();
                }
                // "bhv"
                // b is the number of beepers
                // h is either 1 or 0, 1 meaning yes horizontal wall
                // v is similar to h 
                increaseBeeper(num) {
                    this.numBeepers += num;
                }
                decreaseBeeper(num) {
                    if (num <= this.numBeepers) {
                        this.numBeepers -= num;
                        return true;
                    } else {
                        return false;
                    }
                }
                setHorizontalWall(condition) {
                    if (condition) {
                        this.horizontalWall = true;
                    } else {
                        this.horizontalWall = false;
                    }
                }
                setVerticalWall(condition) {
                    if (condition) {
                        this.verticalWall = true;
                    } else {
                        this.verticalWall = false;
                    }
                }
                position(x, y) {
                    let center = [this.coords[0]+Intersection.blockWidth/2, this.coords[1]+Intersection.blockWidth/2];
                    let length = Intersection.blockWidth;
                    return [(center[0]+x*length*0.5), (center[1]+(-y*length)*0.5)];
                }
                minX() {
                    return this.coords[0];
                }
                maxX() {
                    return this.coords[0]+Intersection.blockWidth;
                }
                minY() {
                    return this.coords[1];
                }
                maxY() {
                    return this.coords[1]+Intersection.blockWidth;
                }
                draw() {
                    let center = this.position(0, 0);
                    let top_left = this.position(-1, 1);
                    let top_right = this.position(1, 1);
                    //top_left = [this.minX(), this.minY()];
                    // Draw the default grid lines
                    ctx.beginPath();
                    ctx.strokeStyle = "red";
                    if (this.buffer) ctx.strokeStyle = "orange";
                    ctx.lineWidth = 2;

                    ctx.moveTo(center[0], this.minY());
                    ctx.lineTo(center[0], this.maxY());
                    ctx.moveTo(this.minX(), center[1]);
                    ctx.lineTo(this.maxX(), center[1]);
                    ctx.stroke();

                    // Draw horizontal wall
                    if (this.horizontalWall) {
                        let img = images["horizontal_wall"]
                        let width = this.width;
                        let height = this.width;

                        ctx.drawImage(img, top_left[0], top_left[1], width, height);
                    }

                    // Draw vertical wall
                    if (this.verticalWall) {
                        let img = images["vertical_wall"]
                        let width = this.width;
                        let height = this.width;

                        ctx.drawImage(img, top_left[0], top_left[1], width, height);
                        console.log();
                    }
                    
                    // Draw beeper
                    if (this.numBeepers >= 1) {
                        ctx.beginPath();
                        ctx.fillStyle = "white";
                        ctx.strokeStyle = "black";
                        ctx.arc(this.position(0, 0)[0], this.position(0, 0)[1], this.width/4, 0, Math.PI*2);
                        ctx.stroke();
                        ctx.fill();

                        let img = images["beeper"]
                        let width = this.width/2;
                        let height = this.width/2;

                        ctx.drawImage(img, top_left[0]+width/2, top_left[1]+width/2, width, height);
                        
                        ctx.font = "600 "+this.width*0.21+"px Inter";
                        ctx.textAlign = "right";
                        ctx.textBaseline = "top";
                        ctx.fillStyle = "black";
                        ctx.strokeStyle = "black";
                        ctx.lineWidth = 5;
                        ctx.fillText(""+this.numBeepers, top_right[0]-0.15*this.width, top_right[1]+0.15*this.width);
                    }

                    // Draw the robot if robot is on its square
                    if (this.hasRobot) {
                        robot.draw(center, this.width);
                    }
                }
            }
            let images = {};
            async function run() {
                images = await loadImages(source);
                Intersection.initializeCity();
                Intersection.resetAll();
                Intersection.resizeCity(10, 10); // make sure not to resize before initialized
                Intersection.city[0][0].setContent("000");
                Intersection.city[1][1].setContent("111");
                console.log(Intersection.city[1][1].horizontalWall);

                controls();
            }
            run();
            
            
            // robot.move();
            // robot.move();
            // robot.turnRight();
            // robot.move();
            function controls() {
                window.addEventListener("keydown", (e) => {
                    let sprint = false;
                    if (e.repeat) return;
                    if (e.shiftKey) robot.isSprinting = true;
                    let key = e.key.toLowerCase();

                    if (key == "w") {
                        robot.moveAbsolute("n");
                    }
                    if (key == "a") {
                        robot.moveAbsolute("w");
                    }
                    if (key == "s") {
                        robot.moveAbsolute("s");
                    }
                    if (key == "d") {
                        robot.moveAbsolute("e");
                    }

                    if (key == "f") {
                        robot.move();
                    }
                    if (key == "q") {
                        robot.turnLeft();
                    }
                    if (key == "e") {
                        robot.turnRight();
                    }
                    if (key == "x") {
                        robot.putBeeper();
                    }
                    if (key == "z") {
                        robot.pickBeeper();
                    }
                    if (key == "p") {
                        console.log(robot.history);
                    }
                    console.log(`Key press detected: ${e.key}`);
                });
                Intersection.resetAll();
            };
        </script>
    </body>
</html>
