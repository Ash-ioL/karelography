<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tool - Karel Code Generator</title>
        <link rel="icon" src="images/favicon.png">
        <style>
            @import "https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap";
            html, body {
                height: 100%;
                margin: 0;
                font-family: "inter";
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                display: flex;
                min-height: 100vh;
                width: 100%;
                align-items: center;
                justify-content: center;
                /*background-image: linear-gradient(to bottom right, rgba(0, 0, 0, 0.569) 0%, white 60%);*/
            }
            #alignment {
                aspect-ratio: 3 / 2;
                width: 100vw;
                max-height: 100vh;
                height: auto;
                background-color: aquamarine;
                container-type: size;
            }
            @media (orientation: portrait) {
                #alignment {
                    aspect-ratio: 4 / 5;
                    height: 100vh;
                    max-width: 100vw;
                    width: auto;
                }
            }
            #canvas-container {
                background-color: rgb(255, 255, 255);
                width: min(100cqh, 100cqw);
                aspect-ratio: 1 / 1;
                height: auto;
                container-type: size;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            canvas {
                background-color: #ffffff;
                border: none;
                width: 100cqw;
                height: 100cqh;
            }
        /* @media(width > height) {
            /* canvas {
                width: 100vh;
                aspect-ratio: 1 / 1;
            }
        } */
        
        /* @media (max-width: 600px) {
            
        } */
        </style>
    </head>
    <body>
        <div id = "alignment">
            <div id="canvas-container">
                <canvas id="grid" width="1000" height="1000">
                    Your browser does not support the HTML canvas tag.
                </canvas>
            </div>
            <div id="settings">

            </div>
        </div>

        <script>
            let dimensionBasis = 1000;
            let c = document.getElementById("grid");
            c.width = dimensionBasis;
            c.height = dimensionBasis;
            c.style.width = "100cqw";
            c.style.height = "100cqh";
            let ctx = c.getContext('2d');
            let imgRoot = "/frontend/images/"
            let source = [
                "robot_north",
                "robot_south",
                "robot_east",
                "robot_west",
                "beeper",
                "horizontal_wall",
                "vertical_wall"
            ];
            
            class Robot {
                constructor(x, y, direction, numBeepers, color) {
                    this.x = x;
                    this.y = y;
                    this.direction = direction; 
                    this.numBeepers = numBeepers; // can be Inifnity
                    this.color = color;
                    this.history = []
                    this.isSprinting = false;
                }
                getPose() {
                    return [this.x, this.y];
                }
                resetIntersection(grid, xOffset, yOffset) {
                    try {
                        grid[this.y+yOffset][this.x+xOffset].reset();
                    } catch {
                        //nothing
                    }
                }
                move() {
                    if (this.isSprinting) {
                        this.isSprinting = false;
                        this.move();
                    }
                    if (this.direction === "n") {
                        this.y += 1;
                        this.resetIntersection(Intersection.city, 0, -1);

                    } else if (this.direction === "s") {
                        this.y -= 1;
                        this.resetIntersection(Intersection.city, 0, 1);
                    } else if (this.direction === "e") {
                        this.x += 1;
                        this.resetIntersection(Intersection.city, -1, 0);
                    } else {
                        this.x -= 1;
                        this.resetIntersection(Intersection.city, 1, 0);
                    }
                    if (this.x >= 0 && this.x < Intersection.avenues && this.y >= 0 && this.y < Intersection.streets) {
                        this.history.push("m");
                    } else {
                        this.x = Math.max(0, Math.min(Intersection.avenues-1, this.x));
                        this.y = Math.max(0, Math.min(Intersection.streets-1, this.y));
                    }
                    this.resetIntersection(Intersection.city, 0, 0);
                    console.log(`Direction = ${this.direction}, Coords = ${this.x}, ${this.y}`);
                }

                uTurn() {
                    if (this.direction === "n") {
                        this.direction = "s";
                    } else if (this.direction === "s") {
                        this.direction = "n";
                    } else if (this.direction === "e") {
                        this.direction = "w";
                    } else {
                        this.direction = "e";
                    }
                    this.history.push("t");
                    this.history.push("t");
                    this.resetIntersection(Intersection.city, 0, 0);
                }
                turnRight() {
                    if (this.isSprinting) {
                        this.isSprinting = false;
                        this.uTurn();
                        return;
                    }
                    if (this.direction === "n") {
                        this.direction = "e";
                    } else if (this.direction === "s") {
                        this.direction = "w";
                    } else if (this.direction === "e") {
                        this.direction = "s";
                    } else {
                        this.direction = "n";
                    }
                    this.history.push("t");
                    this.history.push("t");
                    this.history.push("t");
                    this.resetIntersection(Intersection.city, 0, 0);
                }
                turnLeft() {
                    if (this.isSprinting) {
                        this.isSprinting = false;
                        this.uTurn();
                        return;
                    }
                    if (this.direction === "n") {
                        this.direction = "w";
                    } else if (this.direction === "s") {
                        this.direction = "e";
                    } else if (this.direction === "e") {
                        this.direction = "n";
                    } else {
                        this.direction = "s";
                    }
                    this.history.push("t");
                    this.resetIntersection(Intersection.city, 0, 0);
                }
                putBeeper() {
                    Intersection.city[this.y][this.x].increaseBeeper(1);
                    this.history.push("b");
                    this.resetIntersection(Intersection.city, 0, 0);
                }
                pickBeeper() {
                    success = Intersection.city[this.y][this.x].decreaseBeeper(1);
                    if (success) this.history.push("b");
                    this.resetIntersection(Intersection.city, 0, 0);
                }
                draw(center, blockWidth) {
                    if (this.direction === "n") {
                        var img = images["robot_north"]
                    } else if (this.direction == "s") {
                        var img = images["robot_south"]
                    } else if (this.direction == "e") {
                        var img = images["robot_east"]
                    } else {
                        var img = images["robot_west"]
                    }
                    let botWidth = 0.7;
                    let area = blockWidth * 0.7;
                    let top_corner = [center[0]-0.5*area, center[1]-0.5*area];
                    ctx.drawImage(img, top_corner[0], top_corner[1], area, area);
                }
            }

            robot = new Robot(0, 0, "e", 4, "red");
            function loadImages(sources) {
                let images = {};
                let loaded = 0;
                let total = Object.keys(sources).length;
                return new Promise(resole => {
                    for (let key of sources) {
                        let img = new Image();
                        img.src = imgRoot+key+".png";

                        img.onload = () => {
                            loaded++;
                            if (loaded === total) {
                                resole(images);
                            }
                        };

                        images[key] = img;
                    }
                });
            }

            class Intersection {
                static avenues = 10;
                static streets = 10;
                static city = [];
                
                static blockWidth = dimensionBasis/Math.max(Intersection.avenues, Intersection.streets);

                static resetAll() {
                    for (let i of Intersection.city) {
                        for (let k of i) {
                            k.resetNoClear();
                        }
                    }
                }
                static resizeCity(newStreets, newAvenues) { 
                    if (newStreets <= 0 ) {
                        newStreets = 1;
                    }
                    if (newAvenues <= 0) {
                        newAvenues = 1;
                    }
                    Intersection.streets = newStreets;
                    Intersection.avenues = newAvenues;

                    Intersection.blockWidth = dimensionBasis/Math.max(newAvenues, newStreets);
                    c.width = Intersection.blockWidth*newAvenues;
                    c.height = Intersection.blockWidth*newStreets;
                    c.style.width = `${100*newAvenues/Math.max(newAvenues, newStreets)}cqw`;
                    c.style.height = `${100*newStreets/Math.max(newAvenues, newStreets)}cqh`;

                    if (Intersection.city.length > 0) {
                        Intersection.city = Intersection.city.slice(0, newStreets);

                        for (let i = 0; i < newStreets; i++) {
                            Intersection.city[i] = Intersection.city[i].slice(0, newAvenues);
                        }
                    }


                    for (let i = 0; i < newAvenues - Intersection.city[0].length; i++) {
                        for (let k = 0; k < Intersection.city.length; k++) {
                            Intersection.city[k].push(new Intersection(Intersection.city[k].length, k, "000"));
                        }
                    }

                    for (let i = 0; i < newStreets-Intersection.city.length; i++) {
                        street = [];
                        for (let k = 0; k < newAvenues; k++){
                            street.push(new Intersection(k, Intersection.city.length, "000"));
                        }
                        Intersection.city.push(street);
                    }

                    Intersection.resetAll();
                    console.log(Intersection.city);
                }
                // problem: canvas origin not in same place as karel's - FIXED
                static initializeCity() {
                    Intersection.city = [];
                    for (let i = 0; i < Intersection.streets; i++) {
                        let street = [];
                        for (let k = 0; k < Intersection.avenues; k++) {
                            street.push(new Intersection(k, i, "000"));
                        }
                        Intersection.city.push(street);
                    }
                }
                constructor(avenue, street) { 
                    this.avenue = avenue;
                    this.street = street;
                    this.width = Intersection.blockWidth;
                    this.numBeepers = 0;
                    this.horizontalWall = false;
                    this.verticalWall = false;
                    this.coords = [avenue*Intersection.blockWidth, ((Intersection.streets-1)-street)*Intersection.blockWidth];
                    this.hasRobot = robot.getPose()[0] === this.avenue && robot.getPose()[1] === this.street;
                }
                // clear the intersection before drawing instead of overlapping
                reset() {
                    ctx.clearRect(this.minX(), this.minY(), this.width, this.width);

                    this.coords = [this.avenue*Intersection.blockWidth, ((Intersection.streets-1)-this.street)*Intersection.blockWidth];
                    this.width = Intersection.blockWidth;
                    this.hasRobot = robot.getPose()[0] === this.avenue && robot.getPose()[1] === this.street;

                    this.draw();
                }
                resetNoClear() {
                    this.coords = [this.avenue*Intersection.blockWidth, ((Intersection.streets-1)-this.street)*Intersection.blockWidth];
                    this.width = Intersection.blockWidth;
                    this.hasRobot = robot.getPose()[0] === this.avenue && robot.getPose()[1] === this.street;

                    this.draw();
                }
                setContent(content) {
                    this.numBeepers = parseInt(content[0]);
                    this.horizontalWall = content[1] === "1";
                    this.verticalWall = content[2] === "1";
                    this.reset();
                }
                // "bhv"
                // b is the number of beepers
                // h is either 1 or 0, 1 meaning yes horizontal wall
                // v is similar to h 
                increaseBeeper(num) {
                    this.numBeepers += num;
                }
                decreaseBeeper(num) {
                    if (num <= this.numBeepers) {
                        this.numBeepers -= num;
                        return true;
                    } else {
                        return false;
                    }
                }
                horizontalWall(condition) {
                    if (condition) {
                        this.horizontalWall = true;
                    } else {
                        this.horizontalWall = false;
                    }
                }
                verticalWall(condition) {
                    if (condition) {
                        this.verticalWall = true;
                    } else {
                        this.verticalWall = false;
                    }
                }
                position(x, y) {
                    let center = [this.coords[0]+Intersection.blockWidth/2, this.coords[1]+Intersection.blockWidth/2];
                    let length = Intersection.blockWidth;
                    return [(center[0]+x*length*0.5), (center[1]+(-y*length)*0.5)];
                }
                minX() {
                    return this.coords[0];
                }
                maxX() {
                    return this.coords[0]+Intersection.blockWidth;
                }
                minY() {
                    return this.coords[1];
                }
                maxY() {
                    return this.coords[1]+Intersection.blockWidth;
                }
                draw() {
                    let center = this.position(0, 0);
                    let top_left = this.position(-1, 1);
                    let top_right = this.position(1, 1);
                    //top_left = [this.minX(), this.minY()];
                    // Draw the default grid lines
                    ctx.beginPath();
                    ctx.strokeStyle = "red";
                    ctx.lineWidth = 2;

                    ctx.moveTo(center[0], this.minY());
                    ctx.lineTo(center[0], this.maxY());
                    ctx.moveTo(this.minX(), center[1]);
                    ctx.lineTo(this.maxX(), center[1]);
                    ctx.stroke();

                    // Draw the robot if robot is on its square
                    if (this.hasRobot) {
                        // ctx.beginPath();
                        // ctx.fillStyle = "white";
                        // ctx.strokeStyle = "black";
                        // ctx.arc(this.position(0, 0)[0], this.position(0, 0)[1], this.width/4, 0, Math.PI*2);
                        robot.draw(center, this.width);
                        // ctx.stroke();
                        // ctx.fill();
                    }

                    // Draw horizontal wall
                    if (this.horizontalWall) {
                        let img = images["horizontal_wall"]
                        let width = this.width;
                        let height = this.width;

                        ctx.drawImage(img, top_left[0], top_left[1], width, height);
                    }

                    // Draw vertical wall
                    if (this.verticalWall) {
                        let img = images["vertical_wall"]
                        let width = this.width;
                        let height = this.width;

                        ctx.drawImage(img, top_left[0], top_left[1], width, height);
                        console.log();
                    }
                    
                    // Draw beeper
                    if (this.numBeepers >= 1) {
                        ctx.beginPath();
                        ctx.fillStyle = "white";
                        ctx.strokeStyle = "black";
                        ctx.arc(this.position(0, 0)[0], this.position(0, 0)[1], this.width/4, 0, Math.PI*2);
                        ctx.stroke();
                        ctx.fill();

                        let img = images["beeper"]
                        let width = this.width/2;
                        let height = this.width/2;

                        ctx.drawImage(img, top_left[0]+width/2, top_left[1]+width/2, width, height);
                        
                        ctx.font = "600 23px Inter";
                        ctx.textAlign = "right";
                        ctx.textBaseline = "top";
                        ctx.fillStyle = "black";
                        ctx.strokeStyle = "black";
                        ctx.lineWidth = 5;
                        ctx.fillText(""+this.numBeepers, top_right[0]-0.15*this.width, top_right[1]+0.15*this.width);
                    }
                }
            }
            let images = {};
            async function init() {
                images = await loadImages(source);
                Intersection.initializeCity();
                Intersection.resetAll();
                Intersection.resizeCity(9, 4); // make sure not to resize before initialized
                Intersection.city[0][0].setContent("000");
                Intersection.city[1][1].setContent("111");
                console.log(Intersection.city[1][1].horizontalWall);

                controls();
            }
            init();
            
            
            // robot.move();
            // robot.move();
            // robot.turnRight();
            // robot.move();
            function controls() {
                window.addEventListener("keydown", (e) => {
                    let sprint = false;
                    if (e.repeat) return;
                    if (e.shiftKey) robot.isSprinting = true;
                    let key = e.key.toLowerCase();

                    if (key == "w") {
                        robot.move();
                    }
                    if (key == "q") {
                        robot.turnLeft();
                    }
                    if (key == "e") {
                        robot.turnRight();
                    }
                    console.log(`Key press detected: ${e.key}`);
                });
                Intersection.resetAll();
            };
        </script>
    </body>
</html>
