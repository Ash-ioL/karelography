<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Home - Karel Code Generator</title>
        <link rel="icon" href="/frontend/images/logos_banners/karelography_logo.svg">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink:wght@100..900&family=Bitcount+Prop+Double:wght@100..900&display=swap" rel="stylesheet">
        <style>
            @import "https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap";
            html, body {
                height: 100%;
                margin: 0;
                font-family: "inter";
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                display: flex;
                flex-direction: row;
                min-height: 100vh;
                width: 100%;
                /*background-image: linear-gradient(to bottom right, rgba(0, 0, 0, 0.569) 0%, white 60%);*/
            }
            div#left {
                height: 100vh;
                flex: 1;
                background-color: transparent;
                gap: 15vh;
                padding: 0 1.5vw;
            }
            div#left img#github {
                width: 4rem;
                aspect-ratio: 1 / 1;
                user-select: none;
                transition: all 0.3s ease-in-out;
            }
            div#left img#github:hover {
                transform: scale(1.1) rotateZ(20deg);
            }
            div#right {
                height: 100vh;
                flex: 1;
                background-color: rgb(0, 0, 0);
                padding-left: 2vw;
                padding-right: 1vw;
            }

            div#right, div#left {
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
            }
            div#left div {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }
            div#left div img#logo {
                width: clamp(10rem, 20vw, 35vh);
                aspect-ratio: 1 / 1;
            }
            
            div#left h1 {
                font-family: "Bitcount Prop Double";
                color: rgb(0, 0, 0);
                font-weight: 400;
                font-size: clamp(2.7rem, 6vw, 4rem);
                text-align: center;
                display: none;
            }
            div#left h2 {
                font-size: 1rem;
                letter-spacing: 0.2rem;
                color: black;
                opacity: 70%;
                text-align: center;
            }

            div#left h2 a {
                color: black;
                opacity: 70%;
            }

            div#right p {
                text-align: left;
                width: 100%;
                font-size: 2.5rem;
                font-weight: 800;
                margin-bottom: 8vh;
                color: white;
            }
            div#right ul {
                list-style: none;
                width: 100%;
                font-size: 2rem;
            }
            div#right li#one {
                animation: all 3s ease-in-out infinite;
                animation-name: one;
            }
            div#right li#two {
                animation: all 3s ease-in-out infinite;
                animation-name: two;
            }

            div#right li#three {
                animation: all 3s ease-in-out infinite;
                animation-name: three;
            }
            @keyframes one {
                0% {
                    color: black;;
                }
                20% {
                    color: lightgray;
                }
                40% {
                    color: black;
                }
                100% {
                    color: black;
                }
            }
            @keyframes two {
                0% {
                    color: black;
                }
                30% {
                    color: black;;
                }
                50% {
                    color: lightgray;
                }
                70% {
                    color: black;
                }
                100% {
                    color: black;
                }
            }
            @keyframes three {
                0% {
                    color: black;
                }
                60% {
                    color: black;;
                }
                80% {
                    color: lightgray;
                }
                100% {
                    color: black;
                }
            }

            div#right a {
                margin-top: 8vh;
                background-color: lightcoral;
                padding: 2.5vh 6vw;
                border-radius: 21312rem;
                transition: all 0.2s ease-in;
                color: white;
                font-weight: 800;
                font-size: 1.5rem;
                letter-spacing: 0.2vw;
                text-decoration: none;
            }
            div#right a:hover {
                background-color: rgb(196, 113, 113);
                transform: scale(1.05);
                cursor: pointer;
                user-select: none;
            }

            @media (max-width: 600px) {
                body {
                    flex-direction: column;
                }
                div#right a {
                    font-size: 1.2rem;
                    margin-top: 5vh;
                }
                div#right p {
                    margin-bottom: 5vh;
                }
                div#left h1 {
                    font-size: 2.9rem;
                }
                div#left img#github {
                    width: 3rem;
                }
                div#left div img#logo {
                    aspect-ratio: 1 / 1;
                }
                div#right p {
                    font-size: 2rem;
                }
                div#right ul {
                    font-size: 1.7rem;
                }

                
                
                body {
                    flex-direction: column;
                }
                div#left {
                    height: 50vh;
                    gap: 7vh;
                    padding: 2.5vh 0;
                }
                div#right {
                    height: 50vh;
                }
            }
        </style>
    </head>
    <body>
        <div id="left">
            <div>
            <img id="logo" src = "/frontend/images/logos_banners/karelography_vertical_banner_transparent.svg">
            <h1>Karelography</h1>
            </div>
            <h2>By <a href="https://github.com/Ash-ioL" target="_blank">Ash-ioL</a></h2>
            <a href="https://github.com/Ash-ioL/karelography" target="_blank"><img id="github" src="/frontend/images/github_logo.png"></a>
        </div>
        <div id="right">
            <p>Generate your robot paths</p>
            <ul>
                <li id="one">with ease</li>
                <li id="two">with efficiency</li>
                <li id="three">with amazingness</li>
            </ul>
            <a href="/tool">Try Now!</a>
        </div>
    </body>
</html>
